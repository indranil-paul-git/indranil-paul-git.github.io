<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7e47" />
      <stop offset="100%" stop-color="#cc295f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Prompt $_ Text (No border, no background) -->
  <text x="64" y="86" 
        font-family="Consolas, 'JetBrains Mono', 'Fira Code', Monaco, monospace" 
        font-size="76" 
        font-weight="bold" 
        fill="url(#accent-grad)" 
        text-anchor="middle"
        filter="url(#glow)"
        letter-spacing="-2">$_</text>
</svg>
